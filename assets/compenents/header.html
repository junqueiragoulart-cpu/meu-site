<div class="tema-container">
  <span class="tema-label">Tema</span>
  <label class="switch">
    <input type="checkbox" id="tema-switch">
    <span class="slider"></span>
  </label>
</div>

<div class="container">
  <div class="logo-area">
    <img src="../img/logo.png" alt="Logo Junqueira Soluções">
  </div>

  <nav>
    <ul>
      <li><a href="../../index.html">Início</a></li>
      <li><a href="../../sobre.html">Sobre</a></li>
      <li><a href="../../servicos.html">Serviços</a></li>
      <li><a href="../../contato.html">Contato</a></li>
    </ul>
  </nav>
</div>

<script>
const temaSwitch = document.getElementById("tema-switch");

if (temaSwitch) {
    temaSwitch.addEventListener("change", function() {
       document.body.classList.toggle("dark-mode"); 

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("tema", "escuro");
        } else {
            localStorage.setItem("tema", "claro");
        }
    });

    if (localStorage.getItem("tema") === "escuro") {
        document.body.classList.add("dark-mode");
        temaSwitch.checked = true;
    }
}
</script>
